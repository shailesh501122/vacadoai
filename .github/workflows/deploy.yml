name: Deploy

# Auto-deploys to the Ubuntu server on every push to main.
# Type-checks first so a broken build is never deployed.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST    - server IP (161.118.165.248)
#   DEPLOY_USER    - ssh user (ubuntu)
#   DEPLOY_SSH_KEY - a private key whose public half is in the server's
#                    ~/.ssh/authorized_keys  (use a FRESH key, not a leaked one)
#   DEPLOY_PORT    - ssh port (optional, default 22)
# Optional repo variable:
#   WEB_PORT       - host port the app binds (default 8080)
#
# Notes:
#  * The server's vacado/.env is the source of truth and is NOT overwritten.
#  * deploy.sh backs up the Postgres DB before each deploy and never drops it.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Type-check backend
        working-directory: vacado/backend
        run: |
          npm ci
          npx prisma generate
          npx tsc --noEmit
      - name: Type-check & build frontend
        working-directory: vacado/frontend
        run: |
          npm ci
          npx tsc --noEmit
          npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/vacadoai"
            if [ ! -d "$REPO_DIR/.git" ]; then
              git clone https://github.com/shailesh501122/vacadoai.git "$REPO_DIR"
            fi
            cd "$REPO_DIR"
            git fetch --all
            git reset --hard origin/main
            cd vacado
            if [ ! -f .env ]; then
              echo "ERROR: vacado/.env missing on server. Create it once, then re-run." >&2
              exit 1
            fi
            export WEB_PORT="${{ vars.WEB_PORT || '8080' }}"
            bash deploy/deploy.sh
