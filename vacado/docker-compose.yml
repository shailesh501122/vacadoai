services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vacado
      POSTGRES_PASSWORD: vacado
      POSTGRES_DB: vacado
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vacado']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apply migrations, then boot the API.
    command: sh -c "npx prisma migrate deploy && node dist/server.js"
    ports:
      - '4000:4000'
    volumes:
      - mediadata:/app/media

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - backend
      - redis
    command: node dist/jobs/worker.js
    volumes:
      - mediadata:/app/media

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '3000:80'

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '80:80'

volumes:
  pgdata:
  redisdata:
  mediadata:
