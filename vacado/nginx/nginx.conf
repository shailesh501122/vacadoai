# Production reverse proxy: terminates traffic and routes to frontend/backend.
upstream vacado_backend { server backend:4000; }
upstream vacado_frontend { server frontend:80; }

server {
  listen 80;
  server_name _;
  client_max_body_size 50m; # large video uploads

  # Stripe webhook + API
  location /api/ {
    proxy_pass http://vacado_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # Generated media (videos, voiceovers, thumbnails) — served by the backend.
  # Without this rule, /media/... falls through to the SPA and returns
  # index.html, so video downloads end up as ".htm" files.
  location /media/ {
    proxy_pass http://vacado_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 600s;
  }

  # SPA
  location / {
    proxy_pass http://vacado_frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

